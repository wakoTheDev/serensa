{% extends 'base.html' %}

{% block content %}
<section class="panel">
    <h2>Confirm Delete</h2>
    <p>Are you sure you want to remove this {{ kind }}: <strong>{{ item }}</strong>?</p>
    <form method="post">
        {% csrf_token %}
        {% if next_url %}
        <input type="hidden" name="next" value="{{ next_url }}">
        {% endif %}
        <button class="btn danger" type="submit">Confirm</button>
    </form>
</section>
{% endblock %}
