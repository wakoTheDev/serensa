{% extends 'base.html' %}

{% block content %}
<section class="panel">
    <h2>{{ title }}</h2>
    <p class="muted">For Admin role: provide phone number and numeric-only password. Vendors can use username and standard password.</p>
    <form method="post" class="form-grid">
        {% csrf_token %}
        {{ form.as_p }}
        <button class="btn" type="submit">Save User</button>
    </form>
</section>
{% endblock %}
