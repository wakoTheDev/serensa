{% extends 'base.html' %}

{% block content %}
<section class="panel">
        <h2>{{ form_title }}</h2>
        <p>{{ form_subtitle }}</p>
    {% if manual_opening_required %}
    <!-- <p><strong>Opening Stock:</strong> <span class="muted">First entry for this shop - enter opening stock manually.</span></p> -->
    {% else %}
    <!-- <p><strong>Opening Stock:</strong> {{ opening_stock_value }} <span class="muted">(auto-filled from the most recent closing stock)</span></p> -->
    {% endif %}
    <!-- <p class="muted"><strong>Accuracy Tip:</strong> Enter any two among <em>Credit</em>, <em>Cash</em>, and <em>Mobile Money</em>. The remaining one is auto-calculated from Total Sales.</p> -->
        <p>
                <strong>Mode:</strong>
                {% if is_edit_mode %}
                        Editing Existing Record
                {% else %}
                        New Entry
                {% endif %}
        </p>
    <form method="post" class="entry-form-grid">
        {% csrf_token %}
        {{ form.as_p }}
                <button class="btn" type="submit">{{ submit_label }}</button>
    </form>
</section>

<script>
(() => {
    const shopField = document.getElementById("id_shop");
    if (!shopField) return;

    shopField.addEventListener("change", () => {
        const params = new URLSearchParams(window.location.search);
        if (shopField.value) {
            params.set("shop", shopField.value);
        } else {
            params.delete("shop");
        }
        window.location.search = params.toString();
    });
})();
</script>
{% endblock %}
