name: Deploy To Vercel

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: vercel-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Vercel Secrets
        shell: bash
        run: |
          [[ -n "$VERCEL_TOKEN" ]] || { echo "Missing GitHub Actions secret: VERCEL_TOKEN"; exit 1; }
          [[ -n "$VERCEL_ORG_ID" ]] || { echo "Missing GitHub Actions secret: VERCEL_ORG_ID"; exit 1; }
          [[ -n "$VERCEL_PROJECT_ID" ]] || { echo "Missing GitHub Actions secret: VERCEL_PROJECT_ID"; exit 1; }

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python Dependencies
        run: python -m pip install -r requirements.txt

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel Environment
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Run Django Migrations
        shell: bash
        run: |
          set -a
          source .vercel/.env.production.local
          set +a
          python manage.py migrate --noinput

      - name: Deploy Production
        run: vercel deploy --prod --yes --token="$VERCEL_TOKEN"
